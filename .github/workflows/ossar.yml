# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates a collection of open source static analysis tools
# with GitHub code scanning. For documentation, or to provide feedback, visit
# https://github.com/github/ossar-action
name: OSSAR

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '24 12 * * 3'

permissions:
  contents: read

jobs:
  OSSAR-Scan:
    # OSSAR runs on windows-latest.
    # ubuntu-latest and macos-latest support coming soon
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Detect whether repo contains package.json; set output 'skip' accordingly.
    - name: Detect package.json
      id: detect_manifest
      shell: pwsh
      run: |
        if (Test-Path 'package.json') {
          echo "skip=false" >> $env:GITHUB_OUTPUT
        } else {
          echo "skip=true" >> $env:GITHUB_OUTPUT
        }

    # Only run OSSAR when a manifest exists (here: package.json).
    - name: Run OSSAR
      if: ${{ steps.detect_manifest.outputs.skip == 'false' }}
      uses: github/ossar-action@v1
      id: ossar
      with:
        # Provide at least one tool or config to avoid "No applicable tools were detected" error.
        # Replace '--tool npm-audit' with a tool appropriate for your project if not Node.js.
        args: '--tool npm-audit'

    # Upload results to the Security tab only when OSSAR actually ran.
    - name: Upload OSSAR results
      if: ${{ steps.detect_manifest.outputs.skip == 'false' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.ossar.outputs.sarifFile }}

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates a collection of open source static analysis tools
# with GitHub code scanning. For documentation, or to provide feedback, visit
# https://github.com/github/ossar-action
name: OSSAR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '29 0 * * 6'

permissions:
  contents: read

jobs:
  OSSAR-Scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Run Guardian CLI directly and produce a SARIF result file.
    - name: Run OSSAR (guardian)
      # Use cmd shell because guardian on windows appears as guardian.cmd in runners
      run: |
        echo Running Guardian with semgrep and trivy...
        REM Ensure at least one tool is passed; guardian will error without --tool or --config
        guardian.cmd --tool semgrep --tool trivy --format sarif --output ossar.sarif
      shell: cmd

    # Upload results to the Security tab
    - name: Upload OSSAR results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ./ossar.sarif
